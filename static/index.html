<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sonos Lyrics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Blurred background art ── */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background-size: cover;
    background-position: center;
    filter: blur(60px) brightness(0.35) saturate(1.8);
    transform: scale(1.1);
    transition: background-image 1.2s ease;
  }
  #bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.5) 100%);
  }

  /* ── Sticky header ── */
  #meta {
    position: sticky; top: 0; z-index: 20;
    padding: env(safe-area-inset-top, 12px) 16px 12px;
    padding-top: max(env(safe-area-inset-top), 12px);
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #art-thumb {
    width: 44px; height: 44px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    background: #1a1a1a;
    display: none;
  }

  #meta-text { flex: 1; min-width: 0; }
  #title {
    font-size: 0.95rem; font-weight: 700;
    color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: -0.01em;
  }
  #artist {
    font-size: 0.8rem; color: rgba(255,255,255,0.6);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  #change-btn {
    flex-shrink: 0;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.8);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 6px 10px 6px 8px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.02em;
    backdrop-filter: blur(10px);
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #change-btn:active { background: rgba(255,255,255,0.22); }
  #change-btn svg { width: 14px; height: 14px; fill: rgba(255,255,255,0.7); flex-shrink: 0; }

  #room-label {
    font-size: 0.65rem;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  /* ── Lyrics ── */
  #lyrics {
    position: relative; z-index: 10;
    padding: 35vh 24px 45vh;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .line {
    font-size: 1.55rem;
    font-weight: 700;
    line-height: 1.35;
    color: rgba(255,255,255,0.22);
    transition: color 0.35s ease, transform 0.35s ease, opacity 0.35s ease;
    cursor: default;
    letter-spacing: -0.02em;
  }

  .line.active {
    color: #ffffff;
    transform: scale(1.04);
    transform-origin: left center;
  }

  .line.recent {
    color: rgba(255,255,255,0.5);
  }

  /* ── Status screen ── */
  #status {
    position: relative; z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80dvh;
    gap: 16px;
  }

  #status-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
  }
  #status-icon svg { width: 26px; height: 26px; fill: rgba(255,255,255,0.6); }

  #status-text {
    font-size: 1rem;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: -0.01em;
  }

  #status-sub {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.35);
  }

  .dot {
    width: 8px; height: 8px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(0.7); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* ── Speaker picker ── */
  #picker {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    display: flex;
    flex-direction: column;
    padding: max(env(safe-area-inset-top), 52px) 20px 32px;
    gap: 10px;
    overflow-y: auto;
  }

  #picker h2 {
    font-size: 1.3rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }

  #picker-sub {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.4);
    margin-top: -4px;
    margin-bottom: 10px;
  }

  .speaker-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px 16px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: background 0.15s, transform 0.1s;
  }
  .speaker-btn:active { background: rgba(255,255,255,0.14); transform: scale(0.98); }
  .speaker-btn.playing { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); }

  .speaker-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .speaker-icon svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.7); }

  .speaker-info { flex: 1; min-width: 0; }
  .speaker-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .speaker-status {
    font-size: 0.73rem;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }
  .speaker-btn.playing .speaker-status { color: #4ade80; }
  .speaker-track {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.55);
    margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .speaker-track .track-title { font-weight: 600; color: rgba(255,255,255,0.85); }
  .speaker-track .track-sep { margin: 0 3px; color: rgba(255,255,255,0.25); }

  .playing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80;
    animation: pulse 1.4s ease-in-out infinite;
    margin-left: auto; flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- Blurred background -->
<div id="bg"></div>
<div id="bg-overlay"></div>

<!-- Speaker picker -->
<div id="picker">
  <h2>Speakers</h2>
  <p id="picker-sub">Choose a room to follow</p>
</div>

<!-- Now playing header -->
<div id="meta" style="display:none">
  <img id="art-thumb" src="" alt="" onerror="this.style.display='none'" onload="this.style.display='block'">
  <div id="meta-text">
    <div id="room-label"></div>
    <div id="title"></div>
    <div id="artist"></div>
  </div>
  <button id="change-btn" onclick="showPicker()">
    <svg viewBox="0 0 24 24"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
    Rooms
  </button>
</div>

<!-- Status -->
<div id="status" style="display:none">
  <div id="status-icon">
    <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
  </div>
  <div id="status-text">Connecting…</div>
  <div id="status-sub"></div>
</div>

<!-- Lyrics -->
<div id="lyrics" style="display:none"></div>

<script>
  const metaEl = document.getElementById("meta");
  const titleEl = document.getElementById("title");
  const artistEl = document.getElementById("artist");
  const artThumb = document.getElementById("art-thumb");
  const bgEl = document.getElementById("bg");
  const statusEl = document.getElementById("status");
  const statusTextEl = document.getElementById("status-text");
  const statusSubEl = document.getElementById("status-sub");
  const statusIconEl = document.getElementById("status-icon");
  const lyricsEl = document.getElementById("lyrics");
  const pickerEl = document.getElementById("picker");

  const roomLabelEl = document.getElementById("room-label");

  let lines = [], activeIdx = -1, rafId = null;
  let lastServerMs = 0, lastServerTimestamp = 0;
  let es = null, selectedIp = null, selectedName = null;

  // ── Speaker picker ──────────────────────────────────

  async function showPicker() {
    if (es) { es.close(); es = null; }
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    pickerEl.style.display = "flex";
    pickerEl.innerHTML = '<h2>Speakers</h2><p id="picker-sub">Choose a room to follow</p>';

    let speakers;
    try {
      const r = await fetch("/speakers");
      speakers = await r.json();
    } catch {
      pickerEl.innerHTML += '<p style="color:rgba(255,255,255,.4);font-size:.9rem;padding:12px 0">Could not load speakers</p>';
      return;
    }

    speakers.forEach(s => {
      const btn = document.createElement("button");
      btn.className = "speaker-btn" + (s.playing ? " playing" : "");
      const speakerSvg = s.playing
        ? `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`
        : `<svg viewBox="0 0 24 24"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>`;
      let trackHtml = '';
      if (s.playing && (s.title || s.artist)) {
        const titleSpan = s.title ? `<span class="track-title">${s.title}</span>` : '';
        const sep = (s.title && s.artist) ? `<span class="track-sep">·</span>` : '';
        const artistSpan = s.artist ? `<span>${s.artist}</span>` : '';
        trackHtml = `<div class="speaker-track">${titleSpan}${sep}${artistSpan}</div>`;
      }
      btn.innerHTML = `
        <div class="speaker-icon">${speakerSvg}</div>
        <div class="speaker-info">
          <div class="speaker-name">${s.name}</div>
          <div class="speaker-status">${s.playing ? "Now playing" : "Idle"}</div>
          ${trackHtml}
        </div>
        ${s.playing ? '<div class="playing-dot"></div>' : ''}`;
      btn.onclick = () => selectSpeaker(s.ip, s.name);
      pickerEl.appendChild(btn);
    });
  }

  function selectSpeaker(ip, name) {
    selectedIp = ip;
    selectedName = name;
    pickerEl.style.display = "none";
    roomLabelEl.textContent = name;
    connectStream(ip);
  }

  // ── SSE stream ───────────────────────────────────────

  function connectStream(ip) {
    if (es) { es.close(); es = null; }
    lines = []; activeIdx = -1; lastServerMs = 0;
    showStatus("note", "Connecting…", "");

    es = new EventSource(`/stream?ip=${encodeURIComponent(ip)}`);

    es.addEventListener("track_change", e => {
      const data = JSON.parse(e.data);
      renderTrack(data);
      lastServerMs = 0;
      lastServerTimestamp = Date.now();
      if (!rafId) rafId = requestAnimationFrame(tick);
    });

    es.addEventListener("position", e => {
      const data = JSON.parse(e.data);
      lastServerMs = data.position_ms;
      lastServerTimestamp = Date.now();
      if (lines.length > 0 && !rafId) rafId = requestAnimationFrame(tick);
    });

    es.addEventListener("waiting", () => {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      showStatus("mute", "Nothing playing", "Start music on this speaker");
    });

    es.onerror = () => {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      showStatus("warn", "Reconnecting…", "");
    };
  }

  // ── Display ──────────────────────────────────────────

  const ICONS = {
    note: `<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`,
    mute: `<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`,
    warn: `<svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>`,
  };

  function showStatus(iconKey, text, sub) {
    metaEl.style.display = "none";
    lyricsEl.style.display = "none";
    statusEl.style.display = "flex";
    statusIconEl.innerHTML = ICONS[iconKey] || ICONS.note;
    statusTextEl.textContent = text;
    statusSubEl.textContent = sub;
  }

  function setBackground(url) {
    if (url) {
      bgEl.style.backgroundImage = `url('${url}')`;
    } else {
      bgEl.style.backgroundImage = "none";
    }
  }

  function renderTrack(data) {
    titleEl.textContent = data.title || "Unknown";
    artistEl.textContent = data.artist || "";
    lines = data.lyrics || [];
    activeIdx = -1;

    // Album art
    if (data.art_url) {
      artThumb.src = data.art_url;
      // onload/onerror on the img handle show/hide
      setBackground(data.art_url);
      bgEl.style.display = "block";
    } else {
      artThumb.style.display = "none";
      bgEl.style.display = "none";
      setBackground(null);
    }

    metaEl.style.display = "flex";
    statusEl.style.display = "none";

    if (lines.length === 0) {
      lyricsEl.style.display = "none";
      showStatus("note", data.title || "Playing", "No lyrics available");
      metaEl.style.display = "flex";
      return;
    }

    lyricsEl.innerHTML = "";
    lines.forEach((l, i) => {
      const div = document.createElement("div");
      div.className = "line";
      div.id = `line-${i}`;
      div.textContent = l.text || " ";
      lyricsEl.appendChild(div);
    });
    lyricsEl.style.display = "flex";
  }

  function updateActive(pMs) {
    if (lines.length === 0) return;
    let lo = 0, hi = lines.length - 1, idx = -1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (lines[mid].time_ms <= pMs) { idx = mid; lo = mid + 1; }
      else hi = mid - 1;
    }
    if (idx === activeIdx) return;

    // Remove previous styles
    if (activeIdx >= 0) {
      const prev = document.getElementById(`line-${activeIdx}`);
      if (prev) { prev.classList.remove("active"); prev.classList.add("recent"); }
    }
    // Remove "recent" from older lines
    if (activeIdx > 1) {
      const older = document.getElementById(`line-${activeIdx - 1}`);
      if (older) older.classList.remove("recent");
    }

    activeIdx = idx;
    if (activeIdx >= 0) {
      const el = document.getElementById(`line-${activeIdx}`);
      if (el) {
        el.classList.add("active");
        el.classList.remove("recent");
        el.scrollIntoView({ block: "center", behavior: "smooth" });
      }
    }
  }

  function tick() {
    updateActive(lastServerMs + (Date.now() - lastServerTimestamp));
    rafId = requestAnimationFrame(tick);
  }

  // ── Boot ─────────────────────────────────────────────
  showPicker();
</script>
</body>
</html>
