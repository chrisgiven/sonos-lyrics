<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sonos Lyrics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Blurred background art ── */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background-size: cover;
    background-position: center;
    filter: blur(60px) brightness(0.35) saturate(1.8);
    transform: scale(1.1);
    transition: background-image 1.2s ease;
  }
  #bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.5) 100%);
  }

  /* ── Sticky header ── */
  #meta {
    position: sticky; top: 0; z-index: 20;
    padding: env(safe-area-inset-top, 12px) 16px 12px;
    padding-top: max(env(safe-area-inset-top), 12px);
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #art-thumb {
    width: 44px; height: 44px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    background: #1a1a1a;
    display: none;
  }

  #meta-text { flex: 1; min-width: 0; }
  #title {
    font-size: 0.95rem; font-weight: 700;
    color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: -0.01em;
  }
  #artist {
    font-size: 0.8rem; color: rgba(255,255,255,0.6);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  #change-btn {
    flex-shrink: 0;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.8);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 6px 10px 6px 8px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.02em;
    backdrop-filter: blur(10px);
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #change-btn:active { background: rgba(255,255,255,0.22); }
  #change-btn svg { width: 14px; height: 14px; fill: rgba(255,255,255,0.7); flex-shrink: 0; }

  #room-label {
    font-size: 0.65rem;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  /* ── Lyrics ── */
  #lyrics {
    position: relative; z-index: 10;
    padding: 35vh 24px calc(45vh + 80px);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .line {
    font-size: 1.55rem;
    font-weight: 700;
    line-height: 1.35;
    color: rgba(255,255,255,0.22);
    transition: color 0.35s ease, transform 0.35s ease, opacity 0.35s ease;
    cursor: default;
    letter-spacing: -0.02em;
  }

  .line.active {
    color: #ffffff;
    transform: scale(1.04);
    transform-origin: left center;
  }

  .line.recent {
    color: rgba(255,255,255,0.5);
  }

  /* ── Status screen ── */
  #status {
    position: relative; z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80dvh;
    gap: 16px;
  }

  #status-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
  }
  #status-icon svg { width: 26px; height: 26px; fill: rgba(255,255,255,0.6); }

  #status-text {
    font-size: 1rem;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: -0.01em;
  }

  #status-sub {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.35);
  }

  .dot {
    width: 8px; height: 8px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(0.7); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* ── Speaker picker ── */
  #picker {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    display: flex;
    flex-direction: column;
    padding: max(env(safe-area-inset-top), 52px) 20px 32px;
    gap: 10px;
    overflow-y: auto;
  }

  #picker h2 {
    font-size: 1.3rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }

  #picker-sub {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.4);
    margin-top: -4px;
    margin-bottom: 10px;
  }

  .speaker-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px 16px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: background 0.15s, transform 0.1s;
  }
  .speaker-btn:active { background: rgba(255,255,255,0.14); transform: scale(0.98); }
  .speaker-btn.playing { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); }

  .speaker-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .speaker-icon svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.7); }

  .speaker-info { flex: 1; min-width: 0; }
  .speaker-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .speaker-status {
    font-size: 0.73rem;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }
  .speaker-btn.playing .speaker-status { color: #4ade80; }
  .speaker-track {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.55);
    margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .speaker-track .track-title { font-weight: 600; color: rgba(255,255,255,0.85); }
  .speaker-track .track-sep { margin: 0 3px; color: rgba(255,255,255,0.25); }

  .playing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80;
    animation: pulse 1.4s ease-in-out infinite;
    margin-left: auto; flex-shrink: 0;
  }

  /* ── Equalizer ── */
  .eq {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 18px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .eq.playing { opacity: 1; }
  .eq-bar {
    width: 3px;
    background: rgba(255,255,255,0.7);
    border-radius: 2px;
    animation: eq-bounce 0.6s ease-in-out infinite alternate;
  }
  .eq-bar:nth-child(2) { animation-duration: 0.9s; }
  .eq-bar:nth-child(3) { animation-duration: 0.75s; }
  @keyframes eq-bounce {
    0%   { height: 4px; }
    100% { height: 14px; }
  }

  /* ── Artist panel ── */
  #artist-panel {
    position: relative; z-index: 10;
    margin: 0 16px 40px;
    padding: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    gap: 14px;
    align-items: flex-start;
  }
  #artist-panel.visible { display: flex; }

  #artist-photo {
    width: 72px; height: 72px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,0.08);
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  #artist-panel-text { flex: 1; min-width: 0; }
  #artist-panel-name {
    font-size: 0.78rem;
    font-weight: 700;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 5px;
  }
  #artist-bio {
    font-size: 0.82rem;
    line-height: 1.55;
    color: rgba(255,255,255,0.65);
  }
  #artist-wiki-link {
    display: inline-block;
    margin-top: 7px;
    font-size: 0.73rem;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    letter-spacing: 0.02em;
  }
  #artist-wiki-link:hover { color: rgba(255,255,255,0.7); }

  /* ── Progress bar ── */
  #progress-wrap {
    position: fixed;
    bottom: calc(60px + env(safe-area-inset-bottom));
    left: 0; right: 0;
    z-index: 30;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px;
    pointer-events: none;
  }
  #progress-track {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: rgba(255,255,255,0.75);
    border-radius: 2px;
    width: 0%;
    transition: width 0.9s linear;
  }
  .time-label {
    font-size: 0.62rem;
    color: rgba(255,255,255,0.35);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    width: 30px;
  }
  #time-remaining { text-align: right; }

  /* ── Player bar ── */
  #player-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 30;
    height: 60px;
    padding: 0 16px;
    padding-bottom: env(safe-area-inset-bottom);
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  #player-bar.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* Volume section */
  #vol-section {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
    position: relative;
  }
  #mute-btn {
    background: none;
    border: none;
    padding: 4px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }
  #mute-btn svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.55); }

  #vol-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.15);
    outline: none;
    cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 4px rgba(0,0,0,0.5);
    cursor: pointer;
  }
  #vol-slider::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    border: none;
    cursor: pointer;
  }
  #vol-pct {
    position: absolute;
    bottom: 22px;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.6);
    padding: 2px 5px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }

  /* Transport */
  #transport {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s, background 0.15s;
  }
  .ctrl-btn:active { background: rgba(255,255,255,0.2); }
  .ctrl-btn.tapped { opacity: 0.4; }
  #prev-btn, #next-btn { width: 34px; height: 34px; }
  #prev-btn svg, #next-btn svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.8); }
  #play-btn { width: 42px; height: 42px; background: rgba(255,255,255,0.9); }
  #play-btn svg { width: 18px; height: 18px; fill: #000; }
</style>
</head>
<body>

<!-- Blurred background -->
<div id="bg"></div>
<div id="bg-overlay"></div>

<!-- Speaker picker -->
<div id="picker">
  <h2>Speakers</h2>
  <p id="picker-sub">Choose a room to follow</p>
</div>

<!-- Now playing header -->
<div id="meta" style="display:none">
  <img id="art-thumb" src="" alt="" onerror="this.style.display='none'" onload="this.style.display='block'">
  <div class="eq" id="eq">
    <div class="eq-bar"></div>
    <div class="eq-bar"></div>
    <div class="eq-bar"></div>
  </div>
  <div id="meta-text">
    <div id="room-label"></div>
    <div id="title"></div>
    <div id="artist"></div>
  </div>
  <button id="change-btn" onclick="showPicker()">
    <svg viewBox="0 0 24 24"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
    Rooms
  </button>
</div>

<!-- Status -->
<div id="status" style="display:none">
  <div id="status-icon">
    <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
  </div>
  <div id="status-text">Connecting…</div>
  <div id="status-sub"></div>
</div>

<!-- Lyrics -->
<div id="lyrics" style="display:none"></div>

<!-- Artist panel -->
<div id="artist-panel">
  <img id="artist-photo" src="" alt="" onerror="this.style.display='none'" onload="this.style.display='block'">
  <div id="artist-panel-text">
    <div id="artist-panel-name"></div>
    <div id="artist-bio"></div>
    <a id="artist-wiki-link" href="#" target="_blank" rel="noopener" style="display:none">Wikipedia ↗</a>
  </div>
</div>

<!-- Progress bar -->
<div id="progress-wrap" style="display:none">
  <span class="time-label" id="time-elapsed">0:00</span>
  <div id="progress-track">
    <div id="progress-fill"></div>
  </div>
  <span class="time-label" id="time-remaining">-0:00</span>
</div>

<!-- Player bar -->
<div id="player-bar">
  <div id="vol-section">
    <button id="mute-btn" title="Mute">
      <svg id="vol-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    </button>
    <input type="range" id="vol-slider" min="0" max="100" value="50">
    <span id="vol-pct"></span>
  </div>
  <div id="transport">
    <button class="ctrl-btn" id="prev-btn" title="Previous">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="ctrl-btn" id="play-btn" title="Play / Pause">
      <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="ctrl-btn" id="next-btn" title="Next">
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
    </button>
  </div>
</div>

<script>
  const metaEl = document.getElementById("meta");
  const titleEl = document.getElementById("title");
  const artistEl = document.getElementById("artist");
  const artThumb = document.getElementById("art-thumb");
  const bgEl = document.getElementById("bg");
  const statusEl = document.getElementById("status");
  const statusTextEl = document.getElementById("status-text");
  const statusSubEl = document.getElementById("status-sub");
  const statusIconEl = document.getElementById("status-icon");
  const lyricsEl = document.getElementById("lyrics");
  const pickerEl = document.getElementById("picker");
  const roomLabelEl = document.getElementById("room-label");

  // Player bar elements
  const playerBar = document.getElementById("player-bar");
  const eqEl = document.getElementById("eq");
  const volSlider = document.getElementById("vol-slider");
  const volPctEl = document.getElementById("vol-pct");
  const progressWrap = document.getElementById("progress-wrap");
  const progressFill = document.getElementById("progress-fill");
  const timeElapsedEl = document.getElementById("time-elapsed");
  const timeRemainingEl = document.getElementById("time-remaining");

  const artistPanel = document.getElementById("artist-panel");
  const artistPhoto = document.getElementById("artist-photo");
  const artistPanelName = document.getElementById("artist-panel-name");
  const artistBioEl = document.getElementById("artist-bio");
  const artistWikiLink = document.getElementById("artist-wiki-link");

  let lines = [], activeIdx = -1, rafId = null;
  let lastServerMs = 0, lastServerTimestamp = 0;
  let es = null, selectedIp = null, selectedName = null;
  let lastArtist = null;

  // Playback state
  let isPlaying = false;
  let lastReceivedMs = -1;
  let stalePosCount = 0;
  let durationMs = 0;
  let lastTimeLabelUpdate = 0;
  let lastVolume = 50;
  let volPctTimeout = null;

  const PLAY_PATH = "M8 5v14l11-7z";
  const PAUSE_PATH = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";
  const VOL_ON_PATH = "M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z";
  const VOL_OFF_PATH = "M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z";

  // ── Helpers ──────────────────────────────────────────

  function setPlaying(playing) {
    isPlaying = playing;
    document.getElementById("play-icon").querySelector("path").setAttribute("d", playing ? PAUSE_PATH : PLAY_PATH);
    eqEl.classList.toggle("playing", playing);
  }

  function showPlayerBar() { playerBar.classList.add("visible"); }
  function hidePlayerBar() {
    playerBar.classList.remove("visible");
    progressWrap.style.display = "none";
  }

  function updateVolIcon(level) {
    document.getElementById("vol-icon").querySelector("path").setAttribute("d", level === 0 ? VOL_OFF_PATH : VOL_ON_PATH);
  }

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec.toString().padStart(2, "0")}`;
  }

  async function sendControl(action) {
    if (!selectedIp) return;
    await fetch(`/control?ip=${encodeURIComponent(selectedIp)}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action }),
    });
  }

  async function sendVolume(level) {
    if (!selectedIp) return;
    await fetch(`/volume?ip=${encodeURIComponent(selectedIp)}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ level }),
    });
  }

  function tapFeedback(btn) {
    btn.classList.add("tapped");
    setTimeout(() => btn.classList.remove("tapped"), 300);
  }

  // ── Transport controls ───────────────────────────────

  document.getElementById("prev-btn").addEventListener("click", function() {
    tapFeedback(this);
    sendControl("previous");
  });

  document.getElementById("play-btn").addEventListener("click", function() {
    tapFeedback(this);
    const action = isPlaying ? "pause" : "play";
    setPlaying(!isPlaying);
    sendControl(action);
  });

  document.getElementById("next-btn").addEventListener("click", function() {
    tapFeedback(this);
    sendControl("next");
  });

  // ── Volume controls ──────────────────────────────────

  volSlider.addEventListener("input", function() {
    const level = parseInt(this.value);
    volPctEl.textContent = `${level}%`;
    volPctEl.style.left = `${(level / 100) * (this.offsetWidth - 14) + 7}px`;
    volPctEl.style.opacity = "1";
    updateVolIcon(level);
    clearTimeout(volPctTimeout);
  });

  volSlider.addEventListener("change", function() {
    const level = parseInt(this.value);
    lastVolume = level;
    sendVolume(level);
    volPctTimeout = setTimeout(() => { volPctEl.style.opacity = "0"; }, 1500);
  });

  document.getElementById("mute-btn").addEventListener("click", function() {
    const current = parseInt(volSlider.value);
    if (current > 0) {
      lastVolume = current;
      volSlider.value = 0;
      updateVolIcon(0);
      sendVolume(0);
    } else {
      volSlider.value = lastVolume;
      updateVolIcon(lastVolume);
      sendVolume(lastVolume);
    }
  });

  // ── Speaker picker ───────────────────────────────────

  async function showPicker() {
    if (es) { es.close(); es = null; }
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    hidePlayerBar();
    pickerEl.style.display = "flex";
    pickerEl.innerHTML = '<h2>Speakers</h2><p id="picker-sub">Choose a room to follow</p>';

    let speakers;
    try {
      const r = await fetch("/speakers");
      speakers = await r.json();
    } catch {
      pickerEl.innerHTML += '<p style="color:rgba(255,255,255,.4);font-size:.9rem;padding:12px 0">Could not load speakers</p>';
      return;
    }

    speakers.forEach(s => {
      const btn = document.createElement("button");
      btn.className = "speaker-btn" + (s.playing ? " playing" : "");
      const speakerSvg = s.playing
        ? `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`
        : `<svg viewBox="0 0 24 24"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>`;
      let trackHtml = '';
      if (s.playing && (s.title || s.artist)) {
        const titleSpan = s.title ? `<span class="track-title">${s.title}</span>` : '';
        const sep = (s.title && s.artist) ? `<span class="track-sep">·</span>` : '';
        const artistSpan = s.artist ? `<span>${s.artist}</span>` : '';
        trackHtml = `<div class="speaker-track">${titleSpan}${sep}${artistSpan}</div>`;
      }
      btn.innerHTML = `
        <div class="speaker-icon">${speakerSvg}</div>
        <div class="speaker-info">
          <div class="speaker-name">${s.name}</div>
          <div class="speaker-status">${s.playing ? "Now playing" : "Idle"}</div>
          ${trackHtml}
        </div>
        ${s.playing ? '<div class="playing-dot"></div>' : ''}`;
      btn.onclick = () => selectSpeaker(s.ip, s.name);
      pickerEl.appendChild(btn);
    });
  }

  function selectSpeaker(ip, name) {
    selectedIp = ip;
    selectedName = name;
    pickerEl.style.display = "none";
    roomLabelEl.textContent = name;
    connectStream(ip);
  }

  // ── SSE stream ───────────────────────────────────────

  function connectStream(ip) {
    if (es) { es.close(); es = null; }
    lines = []; activeIdx = -1; lastServerMs = 0;
    lastReceivedMs = -1; stalePosCount = 0;
    durationMs = 0;
    lastArtist = null;
    artistPanel.classList.remove("visible");
    showStatus("note", "Connecting…", "");

    es = new EventSource(`/stream?ip=${encodeURIComponent(ip)}`);

    es.addEventListener("track_change", e => {
      const data = JSON.parse(e.data);
      renderTrack(data);
      lastServerMs = 0;
      lastServerTimestamp = Date.now();
      if (!rafId) rafId = requestAnimationFrame(tick);
    });

    es.addEventListener("position", e => {
      const data = JSON.parse(e.data);
      if (data.position_ms === lastReceivedMs) {
        stalePosCount++;
        if (stalePosCount >= 3) setPlaying(false);
      } else {
        stalePosCount = 0;
        lastReceivedMs = data.position_ms;
        setPlaying(true);
      }
      lastServerMs = data.position_ms;
      lastServerTimestamp = Date.now();
      if (lines.length > 0 && !rafId) rafId = requestAnimationFrame(tick);
    });

    es.addEventListener("waiting", () => {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      setPlaying(false);
      showStatus("mute", "Nothing playing", "Start music on this speaker");
      // Keep player bar visible so user can press play
      if (selectedIp) showPlayerBar();
    });

    es.onerror = () => {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      showStatus("warn", "Reconnecting…", "");
    };
  }

  // ── Display ──────────────────────────────────────────

  const ICONS = {
    note: `<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`,
    mute: `<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`,
    warn: `<svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>`,
  };

  function showStatus(iconKey, text, sub) {
    hidePlayerBar();
    // Keep meta header (Rooms button) visible if a speaker is already selected
    if (!selectedIp) {
      metaEl.style.display = "none";
    }
    lyricsEl.style.display = "none";
    statusEl.style.display = "flex";
    statusIconEl.innerHTML = ICONS[iconKey] || ICONS.note;
    statusTextEl.textContent = text;
    statusSubEl.textContent = sub;
  }

  async function updateArtistPanel(artist, artUrl) {
    if (!artist || artist === lastArtist) return;
    lastArtist = artist;
    artistPanel.classList.remove("visible");
    try {
      const params = new URLSearchParams({ name: artist, art_url: artUrl || "" });
      const r = await fetch(`/artist?${params}`);
      const data = await r.json();
      if (artist !== lastArtist) return; // artist changed while fetching
      if (!data.bio && !data.image_url) return;
      artistPanelName.textContent = artist;
      artistBioEl.textContent = data.bio || "";
      if (data.wiki_url) {
        artistWikiLink.href = data.wiki_url;
        artistWikiLink.style.display = "inline-block";
      } else {
        artistWikiLink.style.display = "none";
      }
      if (data.image_url) {
        artistPhoto.src = data.image_url;
        artistPhoto.style.display = "block";
      } else {
        artistPhoto.style.display = "none";
      }
      artistPanel.classList.add("visible");
    } catch {
      // silently skip if unavailable
    }
  }

  function setBackground(url) {
    if (url) {
      bgEl.style.backgroundImage = `url('${url}')`;
    } else {
      bgEl.style.backgroundImage = "none";
    }
  }

  function renderTrack(data) {
    titleEl.textContent = data.title || "Unknown";
    artistEl.textContent = data.artist || "";
    lines = data.lyrics || [];
    activeIdx = -1;

    // Album art
    if (data.art_url) {
      artThumb.src = data.art_url;
      setBackground(data.art_url);
      bgEl.style.display = "block";
    } else {
      artThumb.style.display = "none";
      bgEl.style.display = "none";
      setBackground(null);
    }

    metaEl.style.display = "flex";
    showPlayerBar();
    setPlaying(true);
    statusEl.style.display = "none";
    updateArtistPanel(data.artist, data.art_url);

    // Volume
    if (data.volume != null) {
      volSlider.value = data.volume;
      lastVolume = data.volume;
      updateVolIcon(data.volume);
    }

    // Progress bar
    durationMs = data.duration_ms || 0;
    if (durationMs > 0) {
      progressWrap.style.display = "flex";
      progressFill.style.transition = "none";
      progressFill.style.width = "0%";
    } else {
      progressWrap.style.display = "none";
    }

    if (lines.length === 0) {
      lyricsEl.style.display = "none";
      showStatus("note", data.title || "Playing", "No lyrics available");
      metaEl.style.display = "flex";
      showPlayerBar();
      return;
    }

    lyricsEl.innerHTML = "";
    lines.forEach((l, i) => {
      const div = document.createElement("div");
      div.className = "line";
      div.id = `line-${i}`;
      div.textContent = l.text || " ";
      lyricsEl.appendChild(div);
    });
    lyricsEl.style.display = "flex";
  }

  function updateActive(pMs) {
    if (lines.length === 0) return;
    let lo = 0, hi = lines.length - 1, idx = -1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (lines[mid].time_ms <= pMs) { idx = mid; lo = mid + 1; }
      else hi = mid - 1;
    }
    if (idx === activeIdx) return;

    if (activeIdx >= 0) {
      const prev = document.getElementById(`line-${activeIdx}`);
      if (prev) { prev.classList.remove("active"); prev.classList.add("recent"); }
    }
    if (activeIdx > 1) {
      const older = document.getElementById(`line-${activeIdx - 1}`);
      if (older) older.classList.remove("recent");
    }

    activeIdx = idx;
    if (activeIdx >= 0) {
      const el = document.getElementById(`line-${activeIdx}`);
      if (el) {
        el.classList.add("active");
        el.classList.remove("recent");
        el.scrollIntoView({ block: "center", behavior: "smooth" });
      }
    }
  }

  function tick() {
    const posMs = lastServerMs + (Date.now() - lastServerTimestamp);
    updateActive(posMs);

    if (durationMs > 0) {
      const pct = Math.min(100, (posMs / durationMs) * 100);
      progressFill.style.width = pct + "%";

      const now = Date.now();
      if (now - lastTimeLabelUpdate >= 1000) {
        lastTimeLabelUpdate = now;
        timeElapsedEl.textContent = formatTime(posMs);
        const rem = Math.max(0, durationMs - posMs);
        timeRemainingEl.textContent = "-" + formatTime(rem);
      }
    }

    rafId = requestAnimationFrame(tick);
  }

  // ── Boot ─────────────────────────────────────────────
  showPicker();
</script>
</body>
</html>
